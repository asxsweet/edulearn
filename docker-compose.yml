# Local PostgreSQL for development (Render uses managed Postgres in production).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edulearn
    ports:
      - '5432:5432'
    volumes:
      - edulearn_pgdata:/var/lib/postgresql/data

volumes:
  edulearn_pgdata:
